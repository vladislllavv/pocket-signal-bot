version: "3.9"

services:
  bot:
    build: .
    container_name: pocket-signal-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"  # TradingView webhook
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

